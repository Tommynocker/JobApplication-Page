<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobApplication-Source</title>
    <base href="/JobApplication-Page/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="JobApplication-Source.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- Restore URL after spa-github-pages redirect (404.html -> index.html) -->
    <script type="text/javascript">(function () {
            var redirect = sessionStorage.redirect;
            if (redirect) {
                delete sessionStorage.redirect;
                try {
                    var url = new URL(redirect);
                    history.replaceState(null, null, url.pathname + url.search + url.hash);
                } catch (e) {
                    // ignore
                }
            }
        })();</script>

    <script src="js/blazorCulture.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
